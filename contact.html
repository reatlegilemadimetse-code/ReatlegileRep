<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Navigation */
        nav {
            background-color: #042545;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }

        header {
            background-color: #0d6ccb;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 25px;
            background: white;
            border-radius: 5px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background-color: #252526;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0a5bdc;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #3a3b3c;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>



<header>
    <h1>Contact Us</h1>
    <p>We’d love to hear from you</p>
</header>

<nav>
    <a href="Quinton Meridian School Project.html">Home</a>
    <a href="about us.html">About Us</a>
    <a href="assignment.html">Assignment Submission</a>
    <a href="gallary.html">Gallery</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <form>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

<footer>
    <p>&copy; 2026 Quinton Madimetse Meridian School Project. All rights reserved.</p>
</footer>

</body>
</html>
