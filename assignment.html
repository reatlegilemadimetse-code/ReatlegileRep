<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment Submission</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: #160101;
        }

        nav {
            background-color: #02203e;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        header {
            background-color: #0c6fd3;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 25px;
            background: white;
            border-radius: 5px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background-color: #2c3e50;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a252f;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #2c3e50;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Assignment Submission</h1>
    <p>Please fill in the form below to submit your assignment</p>
</header>

<nav>
    <a href="Quinton Meridian School Project.html">Home</a>
    <a href="about us.html">About Us</a>
    <a href="assignment.html">Assignment Submission</a>
    <a href="gallary.html">Gallery</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <!-- FIXED FORM -->
    <form action="Assignment Submited.html" method="get">
        
        <label for="name">Student Name</label>
        <input type="text" id="name" name="name" required>

        <label for="class">Class</label>
        <input type="text" id="class" name="class" required>

        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
            <option value="">-- Select Subject --</option>
            <option>Mathematics</option>
            <option>English</option>
            <option>Natural Science</option>
            <option>Technology</option>
            <option>Geography</option>
            <option>History</option>
            <option>Economic Management Science</option>
            <option>Other</option>
        </select>

        <label for="assignment">Assignment Title</label>
        <input type="text" id="assignment" name="assignment" required>

        <label for="file">Upload Assignment</label>
        <input type="file" id="file" name="file" required>

        <label for="comments">Comments (Optional)</label>
        <textarea id="comments" name="comments" rows="4"></textarea>

        <button type="submit">Submit Assignment</button>

    </form>
</div>

<footer>
    <p>&copy; 2026 Quinton Madimetse Meridian School Project. All rights reserved.</p>
</footer>

</body>
</html>
